<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shop · Dial Funghi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/system.css">
<style>body { background: var(--c-paper); }</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <rect width="400" height="400" fill="#0F1410"/>
    <rect x="60" y="60" width="280" height="280" rx="40" fill="#D4FF3C" stroke="#0F1410" stroke-width="6" transform="rotate(-3 200 200)"/>
    <text x="200" y="220" text-anchor="middle" font-family="Archivo Black, sans-serif" font-size="64" font-weight="900" fill="#0F1410">SHOP</text>
    <text x="200" y="270" text-anchor="middle" font-family="Archivo Black, sans-serif" font-size="20" fill="#0F1410">DIAL FUNGHI</text>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>
  <script>window.__SUBPAGE = false;</script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script crossorigin src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
  <script>if (!window.Motion && window.FramerMotion) window.Motion = window.FramerMotion;</script>

  <!-- ext-resource-dependency for JS-referenced images -->
  <meta name="ext-resource-dependency" content="assets/logo-dial.png" data-resource-id="logo_dial">
  <meta name="ext-resource-dependency" content="assets/products/porcini-speck.png" data-resource-id="prod_ffps">
  <meta name="ext-resource-dependency" content="assets/products/tartufo-pecorino.png" data-resource-id="prod_fftap">
  <meta name="ext-resource-dependency" content="assets/products/paprika-bbq.png" data-resource-id="prod_ffpab">
  <meta name="ext-resource-dependency" content="assets/products/teriyaki-zenzero.png" data-resource-id="prod_fft">
  <meta name="ext-resource-dependency" content="assets/products/polenta.png" data-resource-id="prod_pol">
  <meta name="ext-resource-dependency" content="assets/products/porcini-secchi.png" data-resource-id="prod_psec">

  <script src="js/products-data.js"></script>
  <script type="text/babel" src="js/bold-shared.jsx"></script>
  <script type="text/babel" src="js/shop.jsx"></script>
  <script type="text/babel">
    // Map JS-only image refs to bundled resources
    const __R = window.__resources || {};
    const __imgMap = {
      "ffps": __R.prod_ffps, "fftap": __R.prod_fftap, "ffpab": __R.prod_ffpab, "fft": __R.prod_fft,
      "grig": __R.prod_grig, "papor": __R.prod_papor, "pol": __R.prod_pol,
      "psec": __R.prod_psec, "pext": __R.prod_pext, "morc": __R.prod_morc, "finf": __R.prod_finf, "shit": __R.prod_shit,
      "bestate": __R.prod_bestate, "bprim": __R.prod_bprim, "baut": __R.prod_baut, "binv": __R.prod_binv,
    };
    if (window.PRODUCTS_DATA) {
      window.PRODUCTS_DATA.products.forEach(p => { if (__imgMap[p.id]) p.img = __imgMap[p.id]; });
    }
    if (__R.logo_dial) window.__LOGO_DIAL = __R.logo_dial;
    ReactDOM.createRoot(document.getElementById("root")).render(<ShopApp />);
  </script>
</body>
</html>
